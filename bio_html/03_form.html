<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 폼 label</title>
</head>
<body>
        <form action = "http://kmr131.dothome.co.kr" method = "get">
            <ul>
                <li>
                    <label for = "id" >아이디</label>
                    <input type = "text" id = "id" name="name"/> <!-- name은 서버측에서 인식하는 이름-->
                </li>
                <li>
                    <label for = "pw" >비밀번호</label>
                    <input type = "password" id = "pw"/>
                </li>
                <li>
                    <input type = "submit" value = "로그인"/>
                </li>
            </ul>
        </form>
</body>
</html>
