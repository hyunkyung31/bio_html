<!DOCTYPE html> <!-- #주석처리 html5의 인식 태그-->
<html lang="ko">
<head> <!-- 페이지에 대한 정보가 나타난다-->
    <meta charset="UTF-8"> <!-- 메타정보 | 페이지에 대한 정보-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- viewport 반응형 웹을 사용할때 사용한다-->
    <title>내가 처음 만드는 HTML 문서</title>
</head>
<body>
    <h1>시간이란...</h1>
    <p>내일 죽을 것처럼 오늘을 살고<br> <!-- p는 문장단락, br은 엔터키-->
    영원히 살 것처럼 내일을 꿈꾸어라. </p>
    <img src="images/bear.jpg">

</body>
</html>
